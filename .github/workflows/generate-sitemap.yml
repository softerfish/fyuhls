name: Generate sitemap

on:
  push:
    paths:
      - 'main/*.html'
      - 'generate-sitemap.ps1'
      - '.github/workflows/generate-sitemap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate sitemap
        shell: pwsh
        run: ./generate-sitemap.ps1

      - name: Commit sitemap if changed
        shell: bash
        run: |
          if git diff --quiet -- main/sitemap.xml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main/sitemap.xml
          git commit -m "chore: update sitemap"
          git push
